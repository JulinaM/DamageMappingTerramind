defaults:
  - base
  - _self_

experiment_name: Unet_Encoder

train_loader: 
  modalities:
    S2L2A:
      before: Images_large/Train/Before/S2L2A
      after: Images_large/Train/After/S2L2A
    S1GRD:
      before: Images_large/Train/Before/S1GRD/DESC
      after: Images_large/Train/After/S1GRD/DESC
  label_dir: Images_large/Train/Labels
  num_augmentations: 5
  patch_size: 224
  stride: 224
  preload: False
  batch_size: 4
  shuffle: True
  num_workers: 2

validation_loader: 
  modalities:
    S2L2A:
      before: Images_large/Validation/Before/S2L2A
      after: Images_large/Validation/After/S2L2A
    S1GRD:
      before: Images_large/Validation/Before/S1GRD/DESC
      after: Images_large/Validation/After/S1GRD/DESC
  label_dir: Images_large/Validation/Labels
  patch_size: 224
  stride: 224
  preload: False
  batch_size: 4
  shuffle: False
  num_workers: 2

holdout_loader:
  modalities:
    S2L2A:
      before: Images_large/Test/Before/S2L2A
      after: Images_large/Test/After/S2L2A
  label_dir: Images_large/Test/Labels
  patch_size: 224
  stride: 224
  num_workers: 2

model: 
  num_classes: 3
  positive_class: 2
  negative_class: 1
  ignore_index : 0
  learning_rate: 0.0005
  num_epochs: 8
  seed: 22

# encoder:
#   name: Terramind
#   version: terramind_v1_base
#   pretrained: true
#   finetune: false
#   modalities: ["S2L2A", "S1GRD"]
#   token_dim: 768
#   feature_indices: [3, 5, 7, 9, 11]
#   build_kwargs: {}

encoder:
  name: UNet
  modalities: ["S2L2A", "S1GRD"]
  build_kwargs:
    channels: [64, 128, 256, 512, 1024]

# encoder:
#   name: Prithvi
#   version: prithvi_eo_v2_tiny_tl
#   pretrained: true
#   finetune: false
#   modalities: ["S2L2A", "S1GRD"]
#   token_dim: 768
#   feature_indices: [3, 5, 7, 9, 11]
#   build_kwargs:
#     model_bands: ["BLUE", "GREEN", "RED", "NIR_NARROW", "SWIR_1", "SWIR_2", "VV", "VH"]

decoder:
  name: UNet
  channels: [64, 128, 256, 512, 1024]

trainer:
  n_epochs: 3
  log_interval: 1
  
use_wandb: False

criterion:
  name: ce #dice_focal, ce
  apply_weight_loss: True
  weight_type: inverse
  dice_weight: 0.5
  focal_weight: 0.5
  focal_gamma: 2.0
  focal_alpha: null
  dice_smooth: 1e-6
