defaults:
  - base
  - _self_

job_type: train_eval

train_loader: 
  modalities:
    S2L2A:
      before: Images_small/Before/S2L2A
      after: Images_small/After/S2L2A
    S1GRD:
      before: Images_small/Before/S1GRD
      after: Images_small/After/S1GRD
  label_dir: Images_small/Relabeled
  num_augmentations: 2
  patch_size: 224
  stride: 224
  preload: False
  batch_size: 4
  shuffle: True
  num_workers: 2

validation_loader: 
  modalities:
    S2L2A:
      before: Images_small/Before/S2L2A
      after: Images_small/After/S2L2A
    S1GRD:
      before: Images_small/Before/S1GRD
      after: Images_small/After/S1GRD
  label_dir: Images_small/Relabeled
  patch_size: 224
  stride: 224
  preload: False
  batch_size: 4
  shuffle: True
  num_workers: 2

holdout_loader:
  modalities:
    S2L2A:
      before: Images_large/Test/Before/S2L2A
      after: Images_large/Test/After/S2L2A
  label_dir: Images_large/Test/Labels
  patch_size: 224
  stride: 224
  num_workers: 2

model: 
  num_classes: 4
  apply_weight_loss: False
  weight_type: inverse
  ignore_index : 0
  positive_class: 2
  negative_class: 1
  TM_version: "terramind_v1_base"
  pretrained: True
  modalities: ["S2L2A", "S1GRD"]
  TM_finetune: False
  learning_rate: 0.0005
  num_epochs: 2
  seed: 22

trainer:
  n_epochs: 1
  log_interval: 1
  
use_wandb: false
